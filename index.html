<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nadine ❤️</title>
    <style>
        :root { --pink: #ff85a1; --dark: #c9184a; --bg: #fff0f3; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }
        
        /* LOGIN CENTER */
        #login-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: var(--bg); z-index: 1000; }
        .box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(201,24,74,0.15); text-align: center; border: 2px solid var(--pink); }
        input { padding: 12px; border: 2px solid #eee; border-radius: 12px; text-align: center; width: 220px; outline: none; font-size: 1rem; }
        .btn { background: var(--dark); color: white; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }

        /* CONTENT */
        #main-content { display: none; grid-template-columns: 1fr 1fr; height: 100vh; }
        .left { display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 2px dashed var(--pink); padding: 40px; text-align: center; }
        .right { padding: 40px; background: rgba(255,255,255,0.4); display: flex; flex-direction: column; justify-content: center; }

        h1 { color: var(--dark); font-size: 3rem; margin: 0; }
        
        /* CANDLE */
        .candle { width: 20px; height: 70px; background: var(--pink); margin: 30px auto; position: relative; border-radius: 8px; }
        .flame { width: 24px; height: 35px; background: #ff9d00; border-radius: 50% 50% 20% 20%; position: absolute; top: -30px; left: -2px; cursor: pointer; animation: flicker 0.1s infinite alternate; box-shadow: 0 0 20px #ff9d00; }
        @keyframes flicker { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* PHOTO GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .slot { aspect-ratio: 4/3; background: white; border-radius: 20px; border: 3px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; overflow: hidden; transform: rotate(-2deg); }
        .slot:nth-child(2) { transform: rotate(3deg); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .edit { display: none; position: absolute; bottom: 10px; right: 10px; background: var(--dark); color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }

        /* SECRET MESSAGE RAINBOW */
        .secret-msg { 
            font-size: 3.5rem; 
            font-weight: bold; 
            background: linear-gradient(90deg, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 3s linear infinite, pop 0.8s ease;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* HEARTS ANIMATION */
        .heart { position: fixed; font-size: 2rem; color: #9b59b6; pointer-events: none; z-index: 99; animation: floatUp 3s ease-in forwards; }
        @keyframes floatUp { from { transform: translateY(0) rotate(0deg); opacity: 1; } to { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }

        /* CONFETTI */
        .conf { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 99; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2 style="color: var(--dark);">For Someone Special... ❤️</h2>
            <input type="password" id="pass" placeholder="Password?">
            <br>
            <button class="btn" onclick="check()">Open Card</button>
        </div>
    </div>

    <div id="main-content">
        <div class="left">
            <h1 id="main-title">Happy Birthday, Nadine!</h1>
            <div id="candle-sec">
                <div class="candle"><div id="flame" class="flame" onclick="blow()"></div></div>
                <p id="hint">Klik apinya...</p>
            </div>
        </div>
        <div class="right">
            <h2 style="color: var(--dark); margin-bottom: 20px;">Memories 📸</h2>
            <div class="grid">
                <div class="slot">
                    <img id="i0" src="IMG-20260508-WA0020_edit_61381549726688.jpg">
                    <label class="edit" id="e0">Edit <input type="file" style="display:none" onchange="pre(event, 0)"></label>
                </div>
                <div class="slot">
                    <img id="i1" src="IMG-20260508-WA0016.jpg">
                    <label class="edit" id="e1">Edit <input type="file" style="display:none" onchange="pre(event, 1)"></label>
                </div>
            </div>
        </div>
    </div>

    <script>
        function check() {
            const p = document.getElementById('pass').value;
            // Password baru: for me? (huruf kecil semua & pakai tanda tanya)
            if(p === "for me?" || p === "ibad") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
                if(p === "ibad") {
                    document.getElementById('e0').style.display = 'block';
                    document.getElementById('e1').style.display = 'block';
                    document.getElementById('main-title').innerText = "Preview Mode 😎";
                }
            } else {
                alert("Wah, salah! Coba ingat-ingat lagi... ❤️");
            }
        }

        function blow() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
            document.getElementById('candle-sec').innerHTML = "<div class='secret-msg'>I Love You Forever 💜</div>";
            
            for(let i=0; i<35; i++) {
                setTimeout(createHeart, i * 100);
                setTimeout(createConfetti, i * 60);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.innerText = '💜';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.bottom = '-50px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }

        function createConfetti() {
            const colors = ['#ff85a1', '#c9184a', '#ff9d00', '#2196f3', '#4caf50'];
            const c = document.createElement('div');
            c.className = 'conf';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-10px';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function pre(e, i) {
            const r = new FileReader();
            r.onload = () => document.getElementById('i' + i).src = r.result;
            r.readAsDataURL(e.target.files);
        }
    </script>
</body>
</html>
