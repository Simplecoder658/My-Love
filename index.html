<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>For Nadine 🎂</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --pink: #ff85a1; --dark-pink: #c9184a; --bg: #fff0f3; }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; }
        
        /* LOGIN TENGAH LAYAR */
        #login-screen { 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: var(--bg); 
            z-index: 1000; 
            position: fixed; 
            top: 0; left: 0;
            text-align: center;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(201, 24, 74, 0.1);
            border: 2px solid var(--pink);
        }

        input { 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            text-align: center; 
            outline: none; 
            width: 200px;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--pink); }

        .btn { 
            background: var(--dark-pink); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold; 
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(201, 24, 74, 0.3); }

        /* MAIN LAYOUT */
        #main-content { display: none; grid-template-columns: 1fr 1fr; height: 100vh; width: 100vw; }
        .left-side { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border-right: 2px dashed var(--pink); text-align: center; }
        .right-side { padding: 20px; background: rgba(255, 255, 255, 0.3); overflow-y: auto; }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--dark-pink); margin: 0; }
        .candle { width: 15px; height: 60px; background: #ff4d6d; margin: 30px auto; position: relative; border-radius: 5px; }
        .flame { width: 22px; height: 32px; background: orange; border-radius: 50%; position: absolute; top: -28px; left: -3px; animation: flicker 0.1s infinite alternate; cursor: pointer; box-shadow: 0 0 20px orange; }
        @keyframes flicker { from { transform: scale(1); } to { transform: scale(1.2); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .photo-slot { aspect-ratio: 4/3; background: #ffe5ec; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed var(--pink); position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .edit-label { display: none; position: absolute; background: var(--dark-pink); color: white; padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; top: 10px; }

        .guestbook { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sticker { font-size: 2.2rem; cursor: pointer; margin: 0 5px; transition: 0.2s; display: inline-block; }
        .secret-msg { font-family: 'Dancing Script'; font-size: 3.5rem; color: var(--dark-pink); animation: pop 0.6s ease-out; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- LAYAR LOGIN DI TENGAH -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--dark-pink); margin-top: 0;">Siapa ini? ❤️</h2>
            <input type="password" id="pass" placeholder="Masukkan Password...">
            <br>
            <button class="btn" onclick="checkLogin()">Masuk</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        <div class="left-side">
            <h1 id="user-title">Happy Birthday, Nadine!</h1>
            <p id="user-sub">Setiap hari bersamamu adalah anugerah. ❤️</p>
            <div id="candle-sec">
                <div class="candle"><div id="flame" class="flame" onclick="blowOut()"></div></div>
                <p id="hint" style="font-size: 0.8rem; color: #666;">Klik api lilinnya...</p>
            </div>
        </div>

        <div class="right-side">
            <h3 style="color: var(--dark-pink); margin-top: 0;">Memories 📸</h3>
            <div class="grid">
                <div class="photo-slot">
                    <img id="img-0" src="https://placeholder.com">
                    <label class="edit-label" id="label-0">Edit <input type="file" style="display:none" onchange="preview(event, 0)"></label>
                </div>
                <div class="photo-slot">
                    <img id="img-1" src="https://placeholder.com">
                    <label class="edit-label" id="label-1">Edit <input type="file" style="display:none" onchange="preview(event, 1)"></label>
                </div>
            </div>
            <div class="guestbook">
                <p style="font-size: 0.8rem; color: #666;">Beri Stiker:</p>
                <span class="sticker" onclick="addSticker('💖')">💖</span>
                <span class="sticker" onclick="addSticker('🎂')">🎂</span>
                <span class="sticker" onclick="addSticker('✨')">✨</span>
                <div id="messages" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const p = document.getElementById('pass').value;
            const main = document.getElementById('main-content');
            const login = document.getElementById('login-screen');

            if(p === "LOVE") {
                login.style.display = 'none';
                main.style.display = 'grid';
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else if(p === "ibad") {
                login.style.display = 'none';
                main.style.display = 'grid';
                document.getElementById('label-0').style.display = 'block';
                document.getElementById('label-1').style.display = 'block';
                document.getElementById('user-title').innerText = "Preview Ibad 😎";
            } else {
                alert("Password salah!");
            }
        }

        function blowOut() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
            
            // Kembang Api Meriah
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            document.getElementById('candle-sec').innerHTML = "<div class='secret-msg'>I Love You Forever</div>";
        }

        function preview(event, idx) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('img-' + idx).src = reader.result;
            };
            reader.readAsDataURL(event.target.files);
        }

        function addSticker(s) {
            const span = document.createElement('span');
            span.innerText = s;
            span.style.fontSize = "2rem";
            document.getElementById('messages').appendChild(span);
            confetti({ particleCount: 15, spread: 40, origin: { x: 0.8, y: 0.8 } });
        }
    </script>
</body>
</html>
