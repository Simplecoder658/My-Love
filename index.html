<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nadine</title>
    <style>
        :root { --pink: #ff85a1; --dark: #c9184a; --bg: #fff0f3; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: var(--bg); z-index: 100; }
        .box { background: white; padding: 30px; border-radius: 20px; border: 2px solid var(--pink); text-align: center; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; width: 180px; }
        .btn { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        #main-content { display: none; grid-template-columns: 1fr 1fr; height: 100vh; }
        .left { display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 2px dashed var(--pink); text-align: center; padding: 20px; }
        .right { padding: 20px; background: rgba(255,255,255,0.5); overflow-y: auto; }

        .candle { width: 15px; height: 50px; background: var(--pink); margin: 20px auto; position: relative; border-radius: 5px; }
        .flame { width: 20px; height: 30px; background: orange; border-radius: 50%; position: absolute; top: -25px; left: -2px; cursor: pointer; box-shadow: 0 0 15px orange; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .slot { aspect-ratio: 4/3; background: #ffe5ec; border-radius: 10px; border: 2px solid var(--pink); position: relative; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .edit { display: none; position: absolute; top: 5px; background: var(--dark); color: white; font-size: 10px; padding: 4px; border-radius: 4px; cursor: pointer; }

        .secret { font-size: 2.2rem; color: var(--dark); font-weight: bold; line-height: 1.2; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2 style="color: var(--dark);">Password? ❤️</h2>
            <input type="password" id="pass" placeholder="...">
            <br>
            <button class="btn" onclick="check()">Masuk</button>
        </div>
    </div>

    <div id="main-content">
        <div class="left">
            <h1 style="color: var(--dark); margin: 0;">Happy Birthday, Nadine!</h1>
            <p>You're the sweetest part of my life. ❤️</p>
            <div id="candle-sec">
                <div class="candle"><div id="flame" class="flame" onclick="blow()"></div></div>
                <p id="hint">Klik apinya...</p>
            </div>
        </div>
        <div class="right">
            <h3 style="margin-top: 0;">Memories 📸</h3>
            <div class="grid">
                <!-- File Pertama -->
                <div class="slot">
                    <img id="i0" src="IMG-20260508-WA0020_edit_61381549726688.jpg">
                    <label class="edit" id="e0">Edit <input type="file" style="display:none" onchange="pre(event, 0)"></label>
                </div>
                <!-- File Kedua -->
                <div class="slot">
                    <img id="i1" src="IMG-20260508-WA0016.jpg">
                    <label class="edit" id="e1">Edit <input type="file" style="display:none" onchange="pre(event, 1)"></label>
                </div>
            </div>
            <div style="background:white; padding:15px; border-radius:15px; text-align:center;">
                <p style="margin-top:0;">Kasih Stiker:</p>
                <button onclick="add('💖')" style="font-size:20px;">💖</button>
                <button onclick="add('🎂')" style="font-size:20px;">🎂</button>
                <button onclick="add('✨')" style="font-size:20px;">✨</button>
                <div id="msgs" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        function check() {
            const p = document.getElementById('pass').value;
            if(p === "LOVE" || p === "ibad") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
                if(p === "ibad") {
                    document.getElementById('e0').style.display = 'block';
                    document.getElementById('e1').style.display = 'block';
                }
            } else { alert("Password salah!"); }
        }

        function blow() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
            document.getElementById('candle-sec').innerHTML = "<div class='secret'>I Love You Forever<br>🎆🎆🎆</div>";
            alert("Happy Birthday Nadine! 🎆");
        }

        function pre(e, i) {
            const r = new FileReader();
            r.onload = () => document.getElementById('i' + i).src = r.result;
            r.readAsDataURL(e.target.files);
        }

        function add(s) {
            const span = document.createElement('span');
            span.innerText = s;
            span.style.fontSize = "25px";
            span.style.margin = "2px";
            document.getElementById('msgs').appendChild(span);
        }
    </script>
</body>
</html>
